body:
  text: 顯果報第一出地獄第二解怨釋結第三發願第四顯果報第一今日道場同業大衆前已具述罪惡過患以過患故乖於勝業以不善業所以墜墮三途備歷惡趣及生人間受諸苦報皆由過去宿對因緣捨身受身無暫停息是以諸佛諸大菩薩神通天眼見三界內一切衆生福盡隨業墮於苦處見無色界樂著定心不覺命終墮於欲界以福盡故受禽獸形色界諸天亦復如是從清淨處墮在欲界既在不淨還受欲樂六天福盡退墮地獄於地獄中受無量苦又見人道就人道中以十善力資得人身惡緣雜染復有多苦壽盡多墮諸惡趣中又見畜生道一切衆生受諸苦惱鞭杖驅馳負重致遠困苦疲劇項領穿破熱鐵燒烙又見餓鬼常苦飢渴恆被火燒猶如劫盡若無微善永不解脫有片福者劣得人身多病短命以自莊嚴大衆當知善惡二輪未曾暫輟果報連環初無休息貧富貴賤隨行所生非有無因而妄招果所以經言為人豪貴國王長者從禮事三寶中來為人大富從布施中來為人長壽從持戒中來為人端正從忍辱中來為人勤修無有懈怠從精進中來為人才明遠達從智慧中來為人音聲清徹從歌詠三寶中來為人潔淨無有疾病從慈心中來為人長大恭敬人故為人短小輕蔑人故為人醜陋喜瞋恚故生無所知不學問故為人顓愚不教他故為人瘖啞謗毀人故為人下使負他債故為人醜黑遮佛光明故生在裸國輕衣搪揬勝己故生馬蹄國著屐勝己前行故生穿胸國布施作福悔惜心故生麞鹿中驚怖人故生墮龍中喜調戲故身生惡瘡鞭撻衆生故人見歡喜見人歡喜故喜遭縣官籠繫衆生故聞説法語於中兩舌亂人聽受後墮耽耳狗中聞説法語心不餐采後生長耳驢中慳貪獨食墮餓鬼中出生為人貧窮飢餓惡食飼人後墮豬豚蜣蜋之中劫奪人物後墮羊中人生剝皮食噉其肉喜偷盜人後生牛馬為人下使喜作妄語傳人惡者死入地獄煬銅灌口拔出其舌以牛耕之罪畢得出生鴝鵅中人聞其聲無不驚怖皆言變怪呪令其死喜飲酒醉後墮沸屎泥犁之中罪畢得出生猩猩中猩猩業畢後得為人頑無所知人不齒録貪人力者後生象中夫處富貴為人上者鞭杖捶打告訴無地如是等人死入地獄數千萬歲受諸苦報從地獄出墮水牛中貫穿鼻口挽船牽車還復受彼大杖打撲償往宿殃為人不淨從豬中來慳貪不恕己者從狗中來佷戾自用從羊中來為人輕躁不能忍事從獼猴中來身體鯹臭從魚鱉中來為人含毒從蛇中來人無慈心從虎狼中來今日道場同業大衆人生世間多病短命種種痛苦不可具説皆由三業搆造所得能令行人嬰三途報所以有三途者人有三毒貪恚愚癡又復三惡口常言惡心常念惡身常行惡以此六事能滅人身常苦常惱無有休息於此命終孤魂獨逝慈親孝子不能相救倏忽之間到閻羅所地獄獄卒不問尊卑但案罪録撿挍生時善惡多少神識自首不敢隱匿以是因緣隨業至趣苦樂之地身自當之杳杳冥冥別離長久道路不同會見無期又諸天神記人善惡乃至毛髮無片遺漏善人行善獲倍億壽惡人行惡命短苦長如是輪轉又墮餓鬼從餓鬼脫生畜生中罪苦難忍受之無竟今日道場同業大衆各自覺悟起慚愧心經言作善得善作惡得惡而五濁惡世不可作惡善不失善報為惡自招殃莫言輕脫立此懺法經言莫輕小善以為無福水滴雖微漸盈大器小善不積無以成聖莫輕小惡以為無罪小惡所積足以滅身大衆當知吉凶禍福皆由心作若不作因亦不得果殃積罪大肉眼不見諸佛所説誰敢不信我等相與生世強健復不勤學自力行善臨窮方悔亦何所及今已共見一切過患如經所説自知其罪豈得不思捨惡從善今生若復不能用心判捨此形必墮地獄何以知之今見為罪之時未嘗不以含毒猛烈懷恨深重若瞋一人必欲令死若嫉一人惡見其好若毀一人必陷苦處若鞭一人窮天楚毒忿恚暴害不避尊卑惡罵醜言無復高下聲震若雷眼中火現至於為福之時善心微劣始欲為多末遂減少初欲速營續後且住心既不至日月推遷如是進退遂就忘失是為作罪之時心氣剛強為福之時志意劣弱今以弱善之因求離強惡之報豈可妄得經云懺悔無罪不滅每至懺悔之時必須五體投地如大山崩此云不惜身命為滅罪因緣故殷勤督勵某甲等相與各省今生已來已曾幾過作此忿責不惜身命捍勞忍苦作此懺悔暫時禮拜已言氣力不堪或暫端坐復言應須消息或言四體不可過勞宜應將養不可使困一伸腳眠差如不死何處復憶我應禮佛掃塔塗地辦所難辦且經教所明未見一善從懶墮懈怠中生亦未曾見有一善法從憍慢自恣中得某甲等今日雖有其形心多背道何以知然今試撿挍從旦至中從中至暮從暮至夜從夜至曉乃至一時一刻一念一頃無有片心念三寶四諦無有片心報父母恩無有片心報師長恩無有片心欲布施持戒忍辱精進無有片心欲學禪定修智慧業清白之法無一可論煩惱重障森然滿目若不作此撿察亦自言我功德不少有小片善而生恃賴言我能作他不能作言我能行他不能行意氣高傲傍若無人追此而言實可羞恥今於大衆前披誠發露懺悔衆罪願布施歡喜將來無障大衆亦宜自浣身心果報之徵具如向説豈得自寬不求捨離大衆莫言我無是罪我既無罪何須懺悔若有此念願即除滅且幾微小失已成大咎瞥然之恨瞋恚便起性與習成難可改革心不可縱意不可逞若能抑忍則煩惱可除如其怠惰未見濟度某甲等今日仰承諸佛慈悲念力諸大菩薩本誓願力説罪業報應教化地獄經宜各靜慮一心諦聽如是我聞一時佛住王舍城耆闍崛山中與菩薩摩訶薩及聲聞眷屬俱亦與比丘比丘尼優婆塞優婆夷及諸天龍鬼神等皆悉集會爾時信相菩薩白佛言世尊今有地獄餓鬼畜生奴婢貧富貴賤種類若干凡有衆生聞佛説法如孩子得母如病得醫如裸得衣如暗得燈世尊説法利益衆生亦復如是爾時世尊觀時已至知諸菩薩勸請殷勤即放眉間白毫相光照于十方無量世界地獄休息苦痛安寧爾時一切受罪衆生尋佛光明來詣佛所繞佛七匝至心作禮勸請世尊廣宣道化令諸衆生得蒙解脫今日道場同業大衆我今至誠勸請諸佛亦復如是願諸衆生同得解脫相與至心等一痛切五體投地勸請十方盡虛空界一切諸佛願以慈悲力救諸苦惱令得安樂又復勸請世間大慈悲父南無彌勒佛南無釋迦牟尼佛南無梵天佛南無不退轉輪成首佛南無大興光王佛南無法種尊佛南無日月燈明佛南無須彌佛南無大須彌佛南無超出須彌佛南無香像佛南無圍繞香勳佛南無淨光佛南無香自在王佛南無大集佛南無香光明佛南無大光佛南無無量光明佛南無師子遊戲菩薩南無師子奮迅菩薩南無堅勇精進菩薩南無金剛慧菩薩南無無邊身菩薩南無觀世音菩薩南無佛陀南無達摩南無僧伽又復歸依如是十方盡虛空界一切三寶一拜大慈大悲唯願救拔一切苦惱令諸衆生即得解脫改往修來不復為惡從今日去畢竟不復墮於三途身口意淨不念人惡離諸業障得清淨業一切衆邪不復更動常行四等精進勇猛植衆德本所為無量捨身受身恆生福地念三途苦發菩提心行菩薩道不休不息六度四等常得現前三明六通如意自在出入遊戲諸佛境界等與菩薩俱成正覺今日道場同業大衆起怖畏心起慈悲心一心一意攝耳諦聽爾時世尊放眉間白毫相光遍照六道一切衆生時信相菩薩為愍念諸衆生故即從座起前至佛所胡跪合掌白佛言世尊今有衆生為諸獄卒銼碓斬身從足斬之乃至其頂斬之已訖巧風吹活還復斬之受此苦報無有休息何罪所致佛言是諸衆生以前世時不信三尊不知供養不孝父母興惡逆心屠兒魁膾斬害衆生以是因緣故獲斯罪復有衆生身體頑痺眉鬚墮落舉身洪爛鳥棲鹿宿人迹斷絶親族棄捨人不喜見如是惡報名之癩病以何因緣故得此罪佛言以前世時不信三尊不孝父母破塔壞寺剝奪道人斫射聖賢傷害師長嘗無反覆背恩忘義常行狗犬玷污所尊不避親疏無有慚愧以是因緣故獲斯罪復有衆生身體長大聾騃無足宛轉腹行唯食泥土以自活命為諸小蟲之所噆食晝夜受苦無有休息何罪所致佛言以前世時為人自用不信好言不孝父母違戾反逆或為地主及作大臣四鎮方伯州郡令長里禁督護恃其威勢侵奪民物無有道理使民窮苦以是因緣故獲斯罪復有衆生兩目失明都無所見或抵樹木或墮溝坑於是死已更復受身既得生已還復如是何罪所致佛言以前世時不信罪福障佛光明縫暗他眼籠閉衆生皮囊盛頭不得所見以是因緣故獲斯罪今日道場同業大衆如經所説大可怖畏我等亦可已作是罪無明所覆不自憶知如是等罪無量無邊於未來世方受苦報今日至心等一痛切五體投地稽顙求哀慚愧改悔已作之罪因懺除滅未作之罪從今清淨仰願十方一切諸佛南無彌勒佛南無釋迦牟尼佛南無開光明佛南無月燈光佛南無月光佛南無日月光明佛南無火光明佛南無集音佛南無最威儀佛南無光明尊佛南無蓮華軍佛南無蓮華響佛南無多寶佛南無師子吼佛南無師子音佛南無精進軍佛南無金剛踊躍佛南無度一切禪絶衆疑佛南無寶大侍從佛南無無憂佛南無地力持勇佛南無最踊躍佛南無師子作菩薩南無棄陰蓋菩薩南無寂根菩薩南無常不離世菩薩南無無邊身菩薩南無觀世音菩薩南無佛陀南無達摩南無僧伽大慈大悲救護拯接令諸衆生即得解脫為諸衆生滅除地獄餓鬼畜生等業令諸衆生畢竟不復受諸惡報令諸衆生捨三途苦悉到智地令得安隱究竟樂處以大光明滅諸癡暗廣為分別甚深妙法使得具足無上菩提成等正覺今日道場同業大衆重復至誠一心諦聽信相菩薩白佛言世尊復有衆生謇吃瘖啞口不能言若有所説不能明了何罪所致佛言以前世時誹謗三尊輕毀聖道論他好惡求人長短強誣良善憎嫉賢人以是因緣故獲斯罪復有衆生腹大頸細不能下食若有所食變為膿血何罪所致佛言以前世時偷盜衆食或為大會施設肴膳私取麻米屏處食之慳惜己物但貪他有常行惡心與人毒藥氣息不通故獲斯罪復有衆生常為獄卒之所燒炙熱鐵灌身鐵釘釘之釘之既訖自然火起焚燒其身悉皆焦爛何罪所致佛言以前世時坐為針師傷人身體不能差病誑他取物令他痛苦故獲斯罪復有衆生常在鑊中牛頭阿旁手捉鐵叉叉著鑊中煮之令爛還即吹活而復煮之何罪所致佛言以前世時屠殺衆生湯灌搣毛不可限量以是惡業故獲斯罪今日道場同業大衆如經所説大可怖畏我等不知在何道中已作如是無量惡業於未來世方嬰劇報亦可即身應見此苦謇吃瘖啞口不能言或復大腹小頸不能下食人生何定今日雖安明亦難保果報一來不可得脫宜各人人覺悟此意直心正念莫復餘想等一痛切五體投地普為今日四生六道一切衆生已受苦者未受苦者歸依世間大慈悲父南無彌勒佛南無釋迦牟尼佛南無自在王佛南無無量音佛南無定光明佛南無寶光明佛南無寶蓋照空佛南無妙寶佛南無諦幢佛南無梵幢佛南無阿彌陀佛南無殊勝佛南無集音佛南無金剛步精進佛南無自在王神通佛南無寶火佛南無淨月幢稱光明佛南無妙樂佛南無無量幢幡佛南無無量幡佛南無大光普遍佛南無寶幢佛南無慧上菩薩南無常不離世菩薩南無無邊身菩薩南無觀世音菩薩南無佛陀南無達摩南無僧伽又復歸依如是十方盡虛空界一切三寶仰願諸佛諸大菩薩大慈大悲救護一切受苦衆生以神通力滅除惡業令諸衆生畢竟不復墮於苦處得清淨趣得清淨生功德滿足不可窮盡捨身受身恆值諸佛同諸菩薩俱登正覺今日道場同業大衆重加心力攝耳諦聽信相菩薩白佛言世尊復有衆生在火城中煻煨齊心四門雖開到則自閉東西馳走不能得出為火燒盡何罪所致佛言以前世時焚燒山澤決撤陂池火炮雞子使諸衆生淤煨而死以是因緣故獲斯罪復有衆生常在雪山寒風所吹皮肉剝裂求死不得求生不得苦毒萬端不可堪忍何罪所致佛言以前世時橫道作賊剝奪人衣以自資養冬月隆寒裸他凍死皮剝牛羊苦痛難忍以是因緣故獲斯罪復有衆生常在刀山劍樹之上若有所捉即便割傷支節斷壞痛毒辛酸不可堪忍何罪所致佛言以前世時屠殺為業烹害衆生屠割剝裂骨肉分離頭腳星散懸於高格稱量而賣或復生懸痛不可忍以是惡業故獲斯罪復有衆生五根不具何罪所致佛言以前世時飛鷹走狗彈射鳥獸或破其頭或斷其足生搣其翼使受痛苦以是惡業故獲斯罪今日道場同業大衆如經所説大可怖畏相與至心等一痛切五體投地普為十方一切衆生已受苦者當受苦者歸依世間大慈悲父南無彌勒佛南無釋迦牟尼佛南無淨光佛南無寶王佛南無樹根華王佛南無維衛莊嚴佛南無開化菩薩佛南無見無恐懼佛南無一乘度佛南無德內豐嚴王佛南無金剛堅強消伏壞散佛南無寶火佛南無寶月光明佛南無賢最佛南無寶蓮華步佛南無壞魔羅網獨步佛南無師子吼力佛南無悲精進佛南無金寶光明佛南無無量尊豐佛南無無量尊離垢王佛南無德首佛南無藥王菩薩南無藥上菩薩南無無邊身菩薩南無觀世音菩薩又復歸依如是十方盡虛空界一切三寶願以大慈大悲救拔十方一切衆生令現受苦者即得解脫當受苦者畢竟斷除畢竟不復墮於惡趣從今日去至于道場除三障業滅五怖畏功德智慧具足莊嚴攝取一切衆生同共回向無上菩提成等正覺今日道場同業大衆重復增到一心諦聽信相菩薩白佛言世尊復有衆生癵躄背僂腰寬不隨腳跛手折不能行步何罪所致佛言以前世時為人憯剋行道安槍或施射戈陷墜衆生以是惡業故獲斯罪復有衆生為諸獄卒縶繫其身枷桁苦厄不能得免何罪所致佛言以前世時網捕衆生籠繫六畜或為宰主令長貪取民物抂繫良善冤訴無所以是惡業故獲斯罪復有衆生或顛或癡或狂或騃不別好醜何罪所致佛言以前世時飲酒醉亂犯三十六失後得癡身猶如醉人不別尊卑以是惡業故獲斯罪復有衆生其形短小陰藏甚大挽之身疲皆復進引行步坐臥以之為妨何罪所致佛言以前世時持生販賣自譽己物毀他財寶巧弄升斗躡稱前後以是惡業故獲斯罪今日道場同業大衆如佛所説大可怖畏相與至心等一痛切五體投地為今日現受苦一切衆生當受苦一切衆生乃至六道現受當受一切衆生又奉為父母師長信施檀越善惡知識廣及十方一切衆生歸依世間大慈悲父南無彌勒佛南無釋迦牟尼佛南無無數精進興豐佛南無無言勝佛南無無愚豐佛南無月英豐佛南無無異光豐佛南無逆空光明佛南無最清淨無量幡佛南無好諦住唯王佛南無成就一切諸剎豐佛南無淨慧德豐佛南無淨輪幡佛南無琉璃光最豐佛南無寶德步佛南無最清淨德寶佛南無度寶光明塔佛南無無量慚愧金最豐佛南無文殊師利菩薩南無普賢菩薩南無無邊身菩薩南無觀世音菩薩又復歸依如是十方盡虛空界一切三寶某甲等今日承佛力法力諸菩薩力為其稽顙求哀懺悔若已受苦者以佛菩薩大慈悲力令即解脫未受苦者從今日去至于道場畢竟不復墮於惡趣離八難苦受八福生得諸善根成就平等具足智慧清淨自在同與如來俱登正覺今日道場同業大衆宜加用心攝耳諦聽信相菩薩復白佛言世尊復有衆生其形極醜身黑如漆兩耳復青高頰俱阜皰面平鼻兩眼黃赤牙齒疏缺口氣鯹臭矬短擁腫大腹小腰腳復繚戾僂脊凸肋費衣健食惡瘡膿血水腫乾消疥癩癰疽種種諸惡集在其身雖親附人人不在意若他作罪橫羅其殃永不見佛永不聞法不識菩薩賢聖從苦入苦不得休息何罪所致佛言以前世時為子不孝父母為臣不忠其君為上不敬其下為下不恭其上朋友不賞其信鄉黨不以義從朝廷不以其爵斷事不以其道心意顛倒無有其度殺害君臣輕凌尊長罰國掠民攻城破塢偷劫盜竊惡業非一美己惡人侵凌孤老誣謗賢善輕慢師長欺誑下賤一切罪業悉具犯之衆罪業故故獲斯罪爾時諸受罪人聞佛世尊作如是説號泣動地淚下如雨而白佛言唯願世尊久住説法化我等輩令得解脫佛言若我久住此世薄福之人不種善根謂我常在不念無常善男子譬如嬰兒母常在側於母不生難遭之想若母去時便生渴仰思戀之心母方還來悉乃生喜善男子我今亦復如是知諸衆生善惡業緣受報好醜故般涅槃于時世尊即於受罪衆生而説偈言水流不常滿火猛不久然日出須臾沒月滿已復虧尊榮豪貴者無常復過是念當勤精進頂禮無上尊爾時世尊説此偈已諸受罪人銜悲白佛言世尊一切衆生作何善行得離斯苦佛言善男子當勤孝養父母敬事師長歸奉三尊勤行布施持戒忍辱精進禪定智慧慈悲喜捨怨親平等無有二相不欺孤老不輕下賤護人猶己不起惡念汝等若能如是修行則為已得報佛之恩永離三途無復衆苦佛説是經已菩薩摩訶薩即得阿耨多羅三藐三菩提聲聞緣覺即得六通三明具八解脫其餘大衆皆得法眼淨若有衆生得聞是經不墮三途八難之處地獄休息苦痛安寧信相菩薩白佛言世尊當何名斯經菩薩摩訶薩云何奉持佛告信相菩薩善男子此經名為罪業報應教化地獄經當奉持之廣令流布功德無量時諸大衆聞説此法一心歡喜頂戴奉行今日道場同業大衆如佛所説大可怖畏相與今日起怖畏心起慈悲心承諸佛力行菩薩道念地獄苦發菩提心當為今日現受地獄道苦一切衆生現受餓鬼道苦一切衆生現受畜生道苦一切衆生乃至六道現受苦者一心一意為其禮懺令此衆生悉得解脫我等若不勤行方便轉禍為福者則於一一地獄皆有罪分相與至心當念父母師長親戚眷屬未來應受苦報亦念自身未來現在方嬰此苦等一痛切五體投地至誠懇惻至到用心願令一念感十方佛一拜斷除無量衆苦若六道中已受苦者以佛力法力賢聖力令此衆生即蒙解脫若六道中未受苦者以佛力法力諸賢聖力令此衆生永得斷除從今日去畢竟不復墮於惡趣除三障業隨念往生滅五怖畏自在解脫勤修道業不休不息妙行莊嚴過法雲地入金剛心成等正覺今日道場同業大衆重復用心攝耳諦聽善思念之雜藏經説時有一鬼白目連言我兩肩有眼胸有口鼻而無有頭何罪所致目連答言汝前世時恆作魁膾弟子若殺人時汝常歡喜以繩結挽以是因緣故受此罪此是華報果在地獄復有一鬼白目連言我此身形常如塊肉無有手足眼耳鼻等恆為蟲鳥之所食噉如是苦痛難堪難忍何罪所致目連答言汝前世時常與他藥令諸衆生命不全活以是因緣故獲斯罪此是華報果在地獄復有一鬼白目連言我腹極大咽喉如針窮年卒歲不得飲食何罪所致目連答言汝前世時作聚落主自恃豪貴飲酒縱橫輕欺他人奪其飲食飢困一切以是因緣故獲斯罪此是華報果在地獄復有一鬼白目連言我一生來有二熱鐵輪在兩腋下舉身焦爛何罪所致目連答言汝前世時與衆作餅盜取二番挾兩腋下以是因緣故獲斯罪此是華報果在地獄復有一鬼白目連言我常以物自幪籠頭畏人來殺心常怖懼何罪所致目連答言汝前世時淫犯外色常畏人見或畏夫主捉縛打殺常懷恐怖故受此罪此是華報果在地獄今日道場同業大衆如經所説豈得不人人生大怖畏相與無始已來至于今日已應作如是無量罪惡如是等罪皆因無明無慈悲心以強𣣋弱傷害衆生作如是罪乃至盜竊他物迷惑失道讒謗賢善作種種罪如是罪報於惡道中必受其苦今日至心等一痛切五體投地普為六道已受苦者未受苦者求哀禮懺奉為父母師長一切眷屬求哀禮懺亦為自身求哀禮懺已作之罪願乞除滅未作之罪不敢復作唯願世間大慈悲父南無彌勒佛南無釋迦牟尼佛南無蓮華尊豐佛南無淨寶興豐佛南無電燈幡王佛南無法空燈佛南無一切衆德成佛南無賢幡幢王佛南無一切寶緻色持佛南無斷疑拔欲除冥佛南無意無恐懼威毛不豎佛南無師子佛南無名稱遠聞佛南無法名號佛南無奉法佛南無法幢佛南無大勢至菩薩南無常精進菩薩南無不休息菩薩南無虛空藏菩薩南無無邊身菩薩南無觀世音菩薩以大慈大悲救護六道現受苦當受苦一切衆生令此衆生即得解脫以神通力斷除惡道及地獄業令諸衆生從今日去至于道場畢竟不復墮於惡趣捨苦報身得金剛身四等六度常得現前四辨六通如意自在勇猛精進不休不息乃至進修滿十地行還復度脫一切衆生
