body:
  text: 發菩提心第四今日道場同業大衆相與已得洗浣心垢十惡重障淨盡無餘業纍既遣內外俱潔次應仰學菩薩修行直道功德智慧由之而生所以諸佛每歎發心是道場能辦事故唯願大衆各堅其志莫以年命待時漏盡勿令空去後悔無益相與今日值遇好時不應日夜煩惱覆心宜當努力發菩提心菩提心者即是佛心功德智慧不可格量蓋論一念況復多念假使歷劫修無量福乃至今生備行餘善不及發心萬分之一算數譬喻亦不能盡又有一人但作福德不發菩提無上道心譬如耕田不下種子既無其芽何處求實以是義故須發菩提心因緣為證上報佛恩下拔一切所以佛讚諸天子言善哉善哉如汝所説為欲利益一切衆生發菩提心是為第一供養如來又發菩提心非止一過唯應數發令菩提心相續不斷是以經言於那由他河沙佛所發大善願是知發心其數無量又發菩提心但遇善知識便得心發未必皆須值佛出世如文殊師利始向菩提乃因女人以發初心慧式不惟凡品輕標心志實由渴仰大乘貪求佛法依倚諸經取譬世事怨親無差六道一相願因斯善俱得解脫若同信解知非戲論今日道場同業大衆發菩提心必須起想先緣所親繫念之時念己父母師長眷屬又念地獄餓鬼畜生又念諸天諸仙一切善神又念人道一切人類有受苦者當云何救見已起想應作是念唯有大心能拔彼苦若一想成應作二想二想成已應作三想三想成已滿一室想一室成已滿一由旬一由旬滿已滿閻浮提閻浮提滿已滿三天下如是漸廣滿十方界見東方衆生盡是其父西方衆生盡是其母南方衆生悉是其兄北方衆生悉是其弟下方衆生悉是姊妹上方衆生悉是師長其餘四維悉是沙門婆羅門等見已作念若受苦時自作我想詣諸人所調身按摩誓拔其苦得解脫已為其説法讚佛讚法讚菩薩衆作是讚已心生歡喜見其受樂如己無異今日道場同業大衆發菩提心應當如是不捨於苦而度衆生相與人人等一痛切五體投地心念口言作是誓願某甲等從今日去乃至道場於其中間在所生處值善知識常發無上菩提之心若在三途及墮八難常使憶念發菩提心令菩提心相續不斷一拜今日道場同業大衆當起勇猛之心殷重誓願發菩提心等一痛切五體投地歸依世間大慈悲父南無彌勒佛南無釋迦牟尼佛南無勇施佛南無清淨佛南無清淨施佛南無娑留那佛南無水天佛南無堅德佛南無旃檀功德佛南無無量菊光佛南無光德佛南無無憂德佛南無那羅延佛南無功德華佛南無堅勇精進菩薩南無金剛慧菩薩南無無邊身菩薩南無觀世音菩薩又復歸依十方盡虛空界一切三寶某甲等今於十方一切三寶前發菩提心從今已去乃至道場行菩薩道誓不退還恆作度脫衆生心恆作安立衆生心恆作覆護衆生心衆生不得佛者誓不先取正覺仰願十方一切諸佛大地菩薩一切賢聖現為我證令某甲等一切行願皆悉成就今日道場同業大衆設使歷劫行多種善乃得人天華報未得出世實果壽終福盡還墮惡趣身壞苦逼不能自免自非立弘誓願發廣大心無由永離生死衰惱相與今日唯當緣念諸佛起堅固志發菩提心發心功德不可稱量諸佛菩薩説不能盡如是善力不可思議豈得不至心學在一意大集經言譬如百年暗室一燈能破勿謂一念心輕而不努力相與胡跪一心合掌遍緣十方一切三寶心念口言某甲等今於十方一切諸佛前於十方一切尊法前於十方一切菩薩前於十方一切賢聖前胡跪合掌直心正念起殷重心不放逸心安住心樂善心度一切心覆護一切心等諸佛心發菩提心某甲等從今日去至坐道場不著人天心不起聲聞心不起辟支佛心唯起大乘心求一切種智心成就阿耨多羅三藐三菩提心唯願十方盡虛空界一切諸佛大地菩薩一切聖人以本願力現為我證以慈悲力加助攝受令某甲等今日發心在所生處堅固不退若在三途及墮八難於三界中受種種身受種種苦難堪難忍誓不以苦故退失今日大心寧入無間大火輪中受種種苦誓不以苦故退失今日大心此心此願等諸佛心同諸佛願重復至誠頂禮三寶某甲等從今已去至于成佛不捨二法知一切法空不捨一切衆生相與至心等一痛切五體投地心念口言某甲等不為自身求無上菩提為救濟一切衆生取無上菩提從今已去至于成佛誓當荷負無量無邊一切衆生起大慈悲盡未來際衆生若有三途重罪六趣厄難某甲等誓不避衆苦以身救護令此衆生得安隱地唯憑十方盡虛空界一切諸佛南無彌勒佛南無釋迦牟尼佛南無蓮華光遊戲神通佛南無財功德佛南無德念佛南無善名功德佛南無紅焰幢王佛南無善遊步功德佛南無寶華遊步佛南無寶蓮華善住娑羅樹王佛南無鬪戰勝佛南無善遊步佛南無周匝莊嚴功德佛南無棄陰蓋菩薩南無寂根菩薩南無無邊身菩薩南無觀世音菩薩願以大慈悲力現為我證令某甲等今日發菩提心行菩薩道在所生處具足成就所到之地一切解脫重復至誠五體投地頂禮十方一切三寶一拜某甲等不為自身求無上菩提為度十方一切衆生取無上菩提從今已去至于成佛若有衆生愚癡黑暗不識正法起諸異見者復有衆生雖修道行不達法相者如此衆生乃至未來某甲等誓以佛力法力賢聖力種種方便令入佛慧令此衆生具足成就一切種智相與至心等一痛切五體投地歸依十方盡虛空界一切諸佛南無彌勒佛南無釋迦牟尼佛南無普光佛南無普明佛南無普淨佛南無多摩羅跋旃檀香佛南無旃檀光佛南無摩尼幢佛南無歡喜藏摩尼寶積佛南無一切世間樂見上大精進佛南無摩尼幢燈光佛南無慧炬照佛南無海德光明佛南無金剛牢強普散金光佛南無大強精進勇猛佛南無大悲光佛南無慈力王佛南無慈藏佛南無慧上菩薩南無常不離世菩薩南無無邊身菩薩南無觀世音菩薩仰願諸佛諸大菩薩大慈悲力大智慧力不思議力無量自在力降伏四魔力斷除五蓋力滅諸煩惱力無量清淨業塵力無量開發觀智力無量開發無漏慧力無量無邊神通力無量度脫衆生力無量覆護衆生力無量安隱衆生力無量斷除苦惱力無量解脫地獄力無量濟度餓鬼力無量救拔畜生力無量攝化阿修羅力無量攝受人道力無量盡諸天諸仙漏力具足莊嚴十地力具足莊嚴淨土力具足莊嚴道場力具足莊嚴佛果功德力具足莊嚴佛果智慧力具足莊嚴法身力具足莊嚴無上菩提力具足莊嚴大涅槃力無量無盡功德力無量無盡智慧力以如是無量無邊自在不可思議力不違本誓不違本願悉以施與十方一切四生六道及今日同發心者必使皆得發心圓滿具足成就諸功德力具足成就菩提願力具足成就菩提行力今日十方若幽若顯若怨若親若非怨親四生六道有緣無緣窮未來際一切衆生以此懺法永得清淨在所生處同得如願一向堅固心無退轉等與如來俱成正覺乃至後流一切衆生異於願界皆悉令入大願海中即得成就功德智慧同諸菩薩滿十地行具足一切種智莊嚴無上菩提究竟解脫一拜發願第五今日道場同業大衆相與已得發大心竟喜踊無量宜復應發如是大願等一痛切五體投地歸依世間大慈悲父南無彌勒佛南無釋迦牟尼佛南無旃檀窟莊嚴勝佛南無賢善首佛南無善意佛南無廣莊嚴王佛南無金剛華佛南無寶蓋照空自在王佛南無虛空寶華光佛南無琉璃莊嚴王佛南無普現色身光佛南無不動智光佛南無降伏諸魔王佛南無才光明佛南無智慧勝佛南無彌勒仙光佛南無藥王菩薩南無藥上菩薩南無無邊身菩薩南無觀世音菩薩願以不思議力同加覆護令某甲等所有誓願皆悉成就在所生處常不忘失究竟無上菩提成等正覺一拜各自心念口言某甲等從今日去願生生世世在在處處常得憶念發菩提心令菩提心相續不斷某甲等從今日去願生生世世在在處處常得奉值無量無邊一切諸佛常得供養供養衆具皆悉滿足某甲等從今日去願生生世世在在處處常得護持大乘方等一切諸經供養衆具皆悉滿足某甲等從今日去願生生世世在在處處常值十方無量無邊一切菩薩供養衆具皆悉滿足某甲等從今日去願生生世世在在處處常值十方無量無邊一切賢聖供養衆具皆悉滿足某甲等從今日去願生生世世在在處處常得奉報覆蔭慈恩有所奉給隨心滿足某甲等從今日去願生生世世在在處處常得奉值和尚阿闍梨所應供養隨念滿足某甲等從今日去願生生世世在在處處常得奉值大力國王共興三寶使不斷絶某甲等從今日去願生生世世在在處處常得莊嚴諸佛國土無有三毒八難之名某甲等從今日去願生生世世在在處處得四無礙智具六神通恆在現前常不忘失以此教化一切衆生相與至心等一痛切五體投地歸依世間大慈悲父南無彌勒佛南無釋迦牟尼佛南無世淨光佛南無善寂月音妙尊智王佛南無龍種上尊王佛南無日月光佛南無日月珠光佛南無慧幡勝王佛南無師子吼自在力王佛南無妙音勝佛南無常光幢佛南無觀世燈佛南無慧威燈王佛南無法勝王佛南無須彌光佛南無須曼那華光佛南無優曇鉢羅華殊勝佛南無大慧力王佛南無阿閦毗歡喜光佛南無無量音聲王佛南無山海慧自在通王佛南無大通光佛南無才光佛南無金海光佛南無一切法常滿王佛南無大勢至菩薩南無普賢菩薩南無無邊身菩薩南無觀世音菩薩又復歸命如是十方盡虛空界一切三寶願承諸佛諸大菩薩一切賢聖大悲心力令某甲等所發誓願所生之處隨心自在某甲等從今日去又願生生世世在在處處若有衆生見我身色即得解脫若入地獄一切地獄變為淨土一切苦緣變為樂具令諸衆生六根清淨身心安樂如第三禪斷諸疑網發初無漏某甲等從今日去願生生世世在在處處若有衆生得聞我聲心即安隱滅除罪垢得陀羅尼解脫三昧具足大忍辨才不斷俱登法雲成等正覺某甲等從今日去願生生世世在在處處一切衆生得聞我名皆悉歡喜得未曾有若到三途斷除衆苦若在人天盡諸有漏所向自在無不解脫某甲等從今日去願生生世世在在處處於一切衆生無有與奪之心無有怨親之想斷三毒根離我我所信樂大法等行慈悲一切和合猶如聖衆某甲等從今日去願生生世世在在處處於一切衆生心常平等猶如虛空毀譽不動怨親一相入深廣心學佛智慧等視衆生如羅睺羅滿十住業得一子地離於有無常行中道相與至心等一痛切五體投地歸依世間大慈悲父南無彌勒佛南無釋迦牟尼佛南無寶海佛南無寶英佛南無寶成佛南無寶光佛南無寶幢幡佛南無寶光明佛南無阿閦佛南無大光明佛南無無量音佛南無大名稱佛南無得大安隱佛南無正音聲佛南無無限淨佛南無月音佛南無無限名稱佛南無月光佛南無無垢光佛南無淨光佛南無金剛藏菩薩南無虛空藏菩薩南無無邊身菩薩南無觀世音菩薩又復歸依如是十方盡虛空界一切三寶願某甲等與四生六道以今懺悔發願功德因緣從今日去至于菩提行菩薩道無有疲厭財法二施無有窮盡智慧方便所作不空隨根應病授以法藥一切見聞同得解脫某甲等又願從今日去乃至菩提行菩薩道無諸留難所到之處常能作大佛事建立道場得心自在得法自在一切三昧無不能入開總持門顯示佛果居法雲地注甘露雨滅除衆生四種魔怨使得清淨法身妙果某甲等今日所有衆願悉如十方諸大菩薩所發誓願所有衆願悉如十方諸佛本時所發一切大願廣大如法性究竟如虛空願某甲等得如所願滿菩提願一切衆生皆悉隨從得如所願仰願十方一切諸佛一切尊法一切菩薩一切賢聖以慈悲力現為我證又願一切天主一切仙主一切善神一切龍神以擁護三寶慈善根力現為證知令諸行願隨心自在一拜發回向心第六今日道場同業大衆已發菩提心竟已發大誓願竟次應發回向心相與至心等一痛切五體投地歸依世間大慈悲父南無彌勒佛南無釋迦牟尼佛南無日光佛南無無量寶佛南無蓮華最尊佛南無身尊佛南無金光佛南無梵自在王佛南無金光明佛南無金海佛南無龍自在王佛南無一切華香自在王佛南無樹王佛南無勇猛執持牢仗棄捨戰鬪佛南無內豐珠光佛南無無量香光明佛南無文殊師利菩薩南無妙音菩薩南無無邊身菩薩南無觀世音菩薩又復歸依十方盡虛空界一切三寶願以慈悲力現為我證某甲等願過去所起一切善業現前所起一切善業未來當起一切善業若多若少若輕若重悉以回施四生六道一切衆生令諸衆生皆得道心不向二乘不向三有同共回向無上菩提又願一切衆生所起善業若過去若現在若未來各各回施不向二乘不向三有同共回向無上菩提今日道場同業大衆相與發菩提心竟發大誓願竟發回向心竟廣大如法性究竟如虛空去來現在一切諸佛諸大菩薩一切賢聖皆為證明重復至誠頂禮三寶一拜某甲等發心發願其事已畢喜踊無量重復至心五體投地奉為國王帝主父母師長歷劫親緣一切眷屬善惡知識諸天諸仙護世四王主善罰惡守護持呪五方龍王龍神八部一切靈祇過去現在窮未來際一切怨親及非怨親四生六道一切衆生歸依世間大慈悲父南無彌勒佛南無釋迦牟尼佛南無師子嚮佛南無大強精進勇力佛南無過去堅住佛南無鼓音王佛南無日月英佛南無超出衆華佛南無世燈明佛南無休多易寧佛南無寶輪佛南無常滅度佛南無淨覺佛南無無量寶華明佛南無須彌步佛南無寶蓮華佛南無一切衆寶普集佛南無法輪衆寶普集豐盈佛南無樹王豐長佛南無圍繞特尊德淨佛南無無垢光佛南無日光佛又復歸依過去無數劫諸佛大師海德如來敬禮無量無邊盡虛空界無生法身菩薩敬禮無量無邊盡虛空界無漏色身菩薩敬禮無量無邊盡虛空界發心菩薩敬禮興正法馬鳴大師菩薩敬禮興像法龍樹大師菩薩敬禮十方盡虛空界無邊身菩薩敬禮十方盡虛空界救苦觀世音菩薩讚佛呪願大聖世尊巍巍堂堂神智妙達衆聖中王形遍六道體散十方頂肉髻相項出日光面如滿月妙色金莊儀容挺特行止安詳威震大千群魔驚遑三達洞照衆邪潛藏見惡必救濟苦為糧度生死岸為行舟航故號如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊度人無量拔生死苦以此發心功德因緣仰願當今皇帝舊云大梁皇帝皇太子殿下國家眷屬從今日去至于道場亡身為法如薩陀波崙大悲滅罪如虛空藏能遠聽法如琉璃光善解難法如無垢藏又願某甲等所生父母歷劫親緣從今日去至于道場散形空界如無邊身具十功德如高貴德王聞法歡喜猶如無畏神力勇猛如大勢至又願某甲等和尚阿闍梨同學眷屬上中下座一切知識從今日去至于道場各得無畏如師子王影響大化猶如寶積聞聲濟苦如觀世音善能咨問如大迦葉又願某甲等出家在俗信施檀越善惡知識各及眷屬從今日去至于道場解諸危厄猶如救脫相貌端嚴猶如文殊能捨業障如棄陰蓋設最後供等於純陀又願諸天諸仙護世四王聰明正直天地虛空主善罰惡守護持呪五方龍王龍神八部幽顯靈祇各及眷屬從今日去至于道場大慈普覆如阿逸多精進護法如不休息遠證讀誦猶如普賢為法焚身猶如藥王又願十方一切怨親及非怨親四生六道一切衆生各及眷屬從今日去至于道場心無愛染如離意女微妙巧説如勝鬘夫人能行精進如釋迦文所有善願等無量壽所有威神如諸天王不可思議如維摩詰一切功德各成就無量佛土悉莊嚴仰願十方盡虛空界無量無邊諸大菩薩一切賢聖以慈悲心同加攝受救護拯接所願圓滿信心堅固德業日遠慈育四生等如一子令諸衆生得四無量心得六波羅蜜十受修禪三願廣被應念見佛皆如勝鬘一切行願畢竟成就等與如來俱登正覺拜
