body:
  text: 慈悲道場懺法傳此懺者梁武帝為皇后郗氏所集也郗氏崩後數月帝常追悼之晝則忽忽不樂宵乃耿耿不寐居寢殿聞外有騷窣之聲視之乃見一蟒盤躃上殿睒睛呀口以向於帝帝大驚駭無所逃遁不得已蹶然而起謂蛇曰朕宮殿嚴警非爾蛇類所生之處必其𪥲孽欲祟朕耶蛇為人語啟帝曰蟒則昔之郗氏也妾以生存嫉妬六宮其性慘毒怒一發則火熾矢射損物害人死以是罪謫為蟒耳無飲食可實口無窟穴可庇身飢窘困迫力不自勝又一鱗甲則有多虫唼嚙肌肉痛苦其劇若加錐刀為蟒非常蛇亦復變化而至不以皇居深重為阻耳感帝平昔眷妾之厚故託醜形骸陳露於帝祈一功德以見拯拔也帝聞之嗚呼感激既而求蟒遂不復見帝明日大集沙門於殿庭宣其由問善之最以贖其苦志公對曰非禮佛懺滌悃欵方可帝乃然其言搜索佛經錄其名號兼親抒睿思灑聖翰撰悔文共成十卷皆採摭佛語削去閑詞為其懺禮又一日聞宮室內異香馥郁良久轉羙初不知所來帝因仰視乃見一天人容儀端麗謂帝曰此則蟒後身也蒙帝功德已得生忉利天今呈本身以為明驗也慇懃致謝言訖不見自梁迄今已數百年得此經本虔敬禮懺所為所祈者皆有陰隲感應猶恐厥事闇然未彰輒以粗記用達諸耳目矣
