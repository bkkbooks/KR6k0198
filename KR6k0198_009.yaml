body:
  text: 已為人道竟次為三惡道禮佛為阿鼻地獄禮佛第一今日道場同業大衆從歸依已來訖此章後每言萬法雖差功用不一至於明暗相形唯善與惡善者則謂人天之勝途惡者則謂三途之異轍修仁義則歸於勝興殘害則墜於劣其居勝者良由業勝非諍競之所要受自然之妙樂期解脫之逍遙其墜劣者良由業劣處火城鐵網之中食則鐵丸熱鐵飲則沸石煬銅年歷踰於造化劫數等於無窮又地獄之苦不可親嬰神離此軀識投彼城報以刀輪加體償以火磨毀形命不肯促抱苦長齡縱復獲免又墮餓鬼口中火出命不全活從此死已又墮畜生復受衆苦或負重致遠驅役險難分布鼎鑊星羅几案肌肉充饋命不盡算實三惡之重苦悲長夜之難旦而優劣皎然無能信者以吾我故好起疑惑以疑惑故多不向善所以佛言世有十事死入惡道意不專善不修功德貪著飲食如彼餓虎鴆嗜酒味喜懷瞋毒常習愚癡不受人諫自任其力辦諸惡事喜殺衆生凌㑥孤弱恆黨惡人侵暴他界有所宣說言不真要不慈一切起諸惡業若人如是不久存世死入惡道今日道場同業大衆如佛所言誰能免者既不能免於地獄中皆有罪分大衆各各覺悟此意唯願大衆宜與時競行菩薩道勤求諸法利益衆生一自滅罪二生他福此則自利利他彼我兼利相與今日起勇猛心起堅固心起慈悲心度一切心救衆生心至坐道場勿忘此願仰承十方盡虛空界一切諸佛諸大菩薩大神通力大慈悲力解脫地獄力濟度餓鬼力救拔畜生力大神呪力大威猛力令某甲等所作利益所願成就等一痛切五體投地為阿鼻大地獄受苦衆生乃至十八寒氷地獄黑暗地獄十八熱地獄十八刀輪地獄劍林地獄火車地獄沸屎地獄鑊湯地獄如是地獄復有八萬四千地獄眷屬等獄其中受苦一切衆生某甲等以菩提心以菩提行以菩提願悉皆代為歸依世間大慈悲父南無彌勒佛南無釋迦牟尼佛南無大音讚佛南無淨願佛南無日天佛南無樂慧佛南無攝身佛南無威德勢佛南無剎利佛南無德乘佛南無上金佛南無解脫髻佛南無樂法佛南無注行佛南無捨驕慢佛南無智藏佛南無梵行佛南無旃檀佛南無無憂名佛南無端嚴身佛南無相國佛南無蓮華佛南無無邊德佛南無天光佛南無慧華佛南無頻頭摩佛南無智富佛南無師子遊戲菩薩南無師子奮迅菩薩南無無邊身菩薩南無觀世音菩薩又復歸依如是十方盡虛空界一切三寶願以慈悲力救拔拯接阿鼻地獄乃至黑暗地獄刀輪地獄火車沸屎眷屬等獄受苦衆生以佛力法力諸菩薩力一切賢聖力令諸衆生即得解脫畢竟不復墮於地獄一切罪障悉得消滅畢竟不復作地獄業捨地獄生得淨土生捨地獄業得智慧命捨地獄身得金剛身捨地獄苦得涅槃樂念地獄苦發菩提心四無量心六波羅蜜常得現前四無礙智六神通力如意自在具足智慧行菩薩道勇猛精進不休不息乃至進修滿十地行入金剛心成等正覺一拜為灰河鐵丸等獄禮佛第二今日道場同業大衆重復至誠五體投地為灰河地獄劍林地獄刺林地獄銅柱地獄鐵機地獄鐵網地獄鐵窟地獄鐵丸地獄尖石地獄如是十方盡虛空界一切地獄今日現受苦一切衆生某甲等以菩提心普為歸依世間大慈悲父南無彌勒佛南無釋迦牟尼佛南無梵財佛南無寶手佛南無淨根佛南無具足論佛南無上論佛南無弗沙佛南無提沙佛南無有日佛南無出泥佛南無得智佛南無謨羅佛南無上吉佛南無法樂佛南無求勝佛南無智慧佛南無善聖佛南無網光佛南無琉璃藏佛南無名聞佛南無利寂佛南無教化佛南無日明佛南無善明佛南無衆德上明佛南無寶德佛南無師子幡菩薩南無師子作菩薩南無無邊身菩薩南無觀世音菩薩又復歸依如是十方盡虛空界一切三寶願以慈悲力同加救拔今日現受灰河等苦一切罪緣皆得解脫一切苦果永得除滅地獄道業畢竟清淨捨地獄身得金剛身捨地獄苦得涅槃樂憶地獄苦發菩提心同出火宅至于道場與諸菩薩俱成正覺為飲銅炭坑等獄禮佛第三今日道場同業大衆重復至心五體投地普為十方盡虛空界一切地獄飲銅地獄衆合地獄叫喚地獄大叫喚地獄熱地獄大熱地獄炭坑燒林如是等無量無邊眷屬等獄今日現受苦衆生某甲等以菩提心普代歸依世間大慈悲父南無彌勒佛南無釋迦牟尼佛南無人月佛南無羅睺佛南無甘露明佛南無妙意佛南無焰明佛南無一切主佛南無樂智佛南無山王佛南無寂滅佛南無德聚佛南無天王佛南無妙音聲佛南無妙華佛南無住義佛南無功德威聚佛南無智無等佛南無甘露音佛南無善守佛南無利慧佛南無思解脫義佛南無音勝佛南無梨陀行佛南無善義佛南無無過佛南無行善佛南無堅勇精進菩薩南無金剛慧菩薩南無無邊身菩薩南無觀世音菩薩又復歸依如是十方盡虛空界一切三寶願以慈悲力救護攝受飲銅等地獄現受苦衆生一切罪障皆得消滅一切衆苦皆得解脫從今日去畢竟不復墮於地獄捨地獄生得淨土生捨地獄命得智慧命四無量心六波羅蜜常得現前四無礙辨六神通力如意自在出地獄道得涅槃道等與如來俱成正覺一拜為刀兵銅釜等獄禮佛第四今日道場同業大衆重復至誠普為十方盡虛空界一切地獄想地獄黑砂地獄釘身地獄火井地獄石臼地獄沸砂地獄刀兵地獄飢餓地獄銅釜地獄如是等無量地獄今日現受苦衆生某甲等今日以菩提心力普為歸依世間大慈悲父南無彌勒佛南無釋迦牟尼佛南無華藏佛南無妙光佛南無樂說佛南無善濟佛南無衆王佛南無離畏佛南無辨才日佛南無名聞佛南無寶月明佛南無上意佛南無無畏佛南無大見佛南無梵音佛南無善音佛南無慧濟佛南無無等意佛南無金剛軍佛南無菩提意佛南無樹王佛南無槃陀音佛南無福德力佛南無勢德佛南無聖愛佛南無勢行佛南無琥珀佛南無棄陰蓋菩薩南無寂根菩薩南無無邊身菩薩南無觀世音菩薩又復歸依如是十方盡虛空界一切三寶願以慈悲力同加救護刀兵地獄一切地獄眷屬等獄受苦衆生即得解脫一切衆苦永得除斷離地獄緣得智慧生憶地獄苦發菩提心行菩薩道不休不息入一乘道滿十地行皆有神力還接一切同坐道場俱登正覺一拜為火城刀山等獄禮佛第五今日道場同業大衆重復至誠普為十方盡虛空界一切地獄火城地獄石窟地獄湯澆地獄刀山地獄虎狼地獄鐵床地獄熱風地獄吐火地獄如是等無量無邊眷屬等獄今日現受苦衆生某甲等以菩提心力普為歸依世間大慈悲父南無彌勒佛南無釋迦牟尼佛南無雷音雲佛南無善愛目佛南無善智佛南無具足佛南無德積佛南無大音佛南無法相佛南無智音佛南無虛空佛南無祠音佛南無慧音差別佛南無功德光佛南無聖王佛南無衆意佛南無辨才輪佛南無善寂佛南無月面佛南無日名佛南無無垢佛南無功德集佛南無華德相佛南無辨才國佛南無寶施佛南無愛月佛南無不高佛南無慧上菩薩南無常不離世菩薩南無無邊身菩薩南無觀世音菩薩又復歸依如是十方盡虛空界一切三寶願以慈悲力同加攝受刀山等獄受苦衆生即得解脫乃至十方不可說一切地獄現受苦當受苦一切衆生願以佛力法力菩薩力賢聖力令諸衆生同得解脫永斷十方諸地獄業從今已去至于道場畢竟不復墮於三途捨身受身常值諸佛具足智慧清淨自在勇猛精進不休不息乃至進修滿十地行登金剛心入種智果以佛神力隨心自在為餓鬼道禮佛第六今日道場同業大衆重復至誠五體投地普為十方盡虛空界一切餓鬼道餓鬼神等一切餓鬼各及眷屬某甲等今日以菩提心力普為歸依世間大慈悲父南無彌勒佛南無釋迦牟尼佛南無師子力佛南無自在王佛南無無量淨佛南無等定佛南無不壞佛南無滅垢佛南無不失方便佛南無無嬈佛南無妙面佛南無智制住佛南無法師王佛南無大天佛南無深意佛南無無量佛南無法力佛南無世供養佛南無華光佛南無三世供佛南無應日藏佛南無天供養佛南無上智人佛南無真髻佛南無信甘露佛南無金剛佛南無堅固佛南無藥王菩薩南無藥上菩薩南無無邊身菩薩南無觀世音菩薩又復歸依如是十方盡虛空界一切三寶願以慈悲力同加攝受救拔一切餓鬼道苦東西南北四維上下盡十方界一切餓鬼道一切餓鬼神各及眷屬一切餓鬼各及眷屬一切罪障皆得消滅一切衆苦皆得解脫身心清涼無復熱惱身心飽滿無復飢渴得甘露味開智慧眼四無量心六波羅蜜常得現前四無礙智六神通力如意自在離餓鬼道入涅槃道等與諸佛俱成正覺一拜為畜生道禮佛第七今日道場同業大衆重復運心五體投地普為東西南北四維上下如是十方盡虛空界一切畜生道四生衆生若大若小水陸空界一切衆生各及眷屬某甲等今日以慈悲心力普為歸依世間大慈悲父南無彌勒佛南無釋迦牟尼佛南無寶肩明佛南無梨陀步佛南無隨日佛南無清淨佛南無明力佛南無功德聚佛南無具足眼佛南無師子行佛南無高出佛南無華施佛南無珠明佛南無蓮華佛南無愛智佛南無槃陀嚴佛南無不虛行佛南無生法佛南無相好佛南無思惟樂佛南無樂解脫佛南無知道理佛南無常精進菩薩南無不休息菩薩南無無邊身菩薩南無觀世音菩薩又復歸依如是十方盡虛空界一切三寶願以慈悲力覆護攝受東西南北四維上下盡空法界一切畜生道一切四生各及眷屬一切罪障皆得消滅一切衆苦皆得解脫同捨惡趣俱得道器身心安樂如第三禪四無量心六波羅蜜常得現前四無礙智六神通力如意自在離畜生道入涅槃道登金剛心成等正覺一拜為六道發願第八某甲等以今奉為諸天諸仙龍神八部禮佛功德因緣願十方盡虛空界四生六道窮未來際一切衆生從今日去至于菩提不復還更抂誤形骸受諸楚毒不復更造十惡五逆却入三途承今禮佛功德因緣各得菩薩摩訶薩淨身口業各得菩薩摩訶薩所有諸心大地心生諸善根大海心受持諸佛智慧大法須彌山心令一切安住無上菩提摩尼寶心遠離煩惱金剛心決定諸法堅固心衆魔外道不能沮壞蓮華心一切世法所不能染淨日心除滅一切愚癡𪾼障虛空心一切衆生無能量者又願四生六道一切衆生從今日去思量識性思量決信解性棄捐調戲常思法語所有皆施心無愛惜心心勇猛不懷怯弱所修功德悉施一切不還邪道專心一向見善如化見惡如夢捨離生死速出三界明了觀察甚深妙法各得供養一切諸佛供養衆具皆悉滿足各得供養一切尊法供養衆具皆悉滿足各得供養一切菩薩供養衆具皆悉滿足各得供養一切賢聖供養衆具皆悉滿足若有後流一切衆生異某甲等今日願界者皆悉令入大願海中即得成就功德智慧以佛神力隨心自在等與如來俱成正覺一拜警念無常今日道場同業大衆相與已得為六道禮懺竟次復應須悟也無常夫三世罪福因果相生惻然在心慮不斯隔常謂影響相符乃可胡越善惡之致非可得而舛也唯願大衆覺悟無常勤修行業以自資身勿生懈怠而不努力智者常歎假使千萬億歲受五欲樂終不得免三惡道苦況我百年而不得半於此促期那得自寬且世間幻惑終歸磨滅常者皆盡高者亦墜合會有離生必應死重官厚祿誰得免之父母兄弟六親眷屬愛徹骨髓當捨壽時不得相代榮華豪貴錢財寶物亦不能延人之壽命亦不可以言辭飲食求囑脫者無形之對誰能留者經云死者盡也氣絶神逝形骸蕭索人物一統無生不終而捨命之時受大苦惱內外六親圍繞號哭死者遑怖莫知依投身虛體冷氣將欲盡見先所作善惡報相其修善者天神扶衛其行惡者牛頭在側獄卒羅剎永無寬恕慈親孝子不能相救夫妻恩愛相看就盡風刀解身苦不可言死者爾時肝膽寸裂無量痛惱一時同集神識周慞如狂如醉決欲起一念善作一毫福懷恨在心不復能得如是苦惱無人代受涅槃經言死者於險難處無有資糧去處懸遠又無伴侶晝夜常行無有邊際深邃幽暗無有光明入無遮止到不得脫生不修福死歸苦處愁毒辛酸不可療治非是惡色令人怖畏今日道場同業大衆生死果報如環無窮孤魂獨逝無人見者不可尋覓不可物寄唯各努力捍勞忍苦勤修四等六波羅蜜以為獨逝諸趣之資莫以強健而自安心宜各至心等一痛切五體投地歸依世間大慈悲父南無彌勒佛南無釋迦牟尼佛南無多聞海佛南無持華佛南無不隨世佛南無喜衆佛南無孔雀音佛南無不退沒佛南無斷有愛垢佛南無威儀濟佛南無諸天流布佛南無寶步佛南無華手佛南無威德佛南無破怨賊佛南無富多聞佛南無妙國佛南無華明佛南無師子智佛南無月出佛南無滅暗佛南無無動佛南無師子遊戲菩薩南無師子奮迅菩薩南無無邊身菩薩南無觀世音菩薩又復歸依如是十方盡虛空界一切三寶願以慈悲力同加覆護今日道場同懺悔者從今日去乃至菩提一切罪因無量苦果悉得斷除煩惱結業畢竟清淨諸佛法會皆現身相行菩薩道隨意自在四等六度如說修行四辨六通無不滿足百千三昧應念現前諸總持門無不能入早登道場成等正覺一拜為執勞運力禮佛今日道場同業大衆重復至誠五體投地起慈悲心無怨親想為今日轉生作熟執勞隨喜施工運力助營福者各及眷屬又為即世牢獄憂厄困苦囹圄繫閉及諸刑罰念其處世雖獲人身樂少苦多枷鎖杻械未嘗離體由何所致或今身造惡或過去所追或應免脫無由自申重罪分死無救護者如是衆生各及眷屬某甲等今日以慈悲心普為歸依一切世間大慈悲父南無彌勒佛南無釋迦牟尼佛南無次第行佛南無福德燈佛南無音聲治佛南無憍曇佛南無勢力佛南無身心住佛南無善月佛南無覺意華佛南無上吉佛南無善威德佛南無智力德佛南無善燈佛南無堅行佛南無天音佛南無安樂佛南無日面佛南無樂解脫佛南無戒明佛南無住戒佛南無無垢佛南無師子幡菩薩南無師子作菩薩南無無邊身菩薩南無觀世音菩薩又復歸依如是十方盡虛空界一切三寶願以慈悲力同加覆護今日執勞隨喜者各及眷屬從今日去至于菩提一切罪障皆得消滅一切衆苦畢竟解脫壽命延長身心安樂永離災厄無復障惱發大乘心修菩薩行六度四等皆悉具足捨生死苦得涅槃樂又願東西二冶諸餘牢獄徒囚繫閉憂厄困苦諸有疾病不得自在者各及眷屬以今為其禮佛功德威力一切衆苦皆悉解脫惡業對因畢竟斷除出牢獄戶入善法門壽命無窮智力無盡身心永樂如第三禪憶牢獄苦念諸佛恩改惡修善皆發大乘行菩薩道至金剛際還復度脫一切衆生同登正覺神力自在一拜已懺悔發菩提心竟次應回向發回向第三今日道場同業大衆已得發心辦所辦竟次復應須以前功德各發回向何以故爾一切衆生所以不能得解脫者皆由著於世間果報不能捨離若有片福一毫之善能回向者則於果報不復生著便得解脫優遊自在所以經歎修行回向為大利益是故今日應發回向兼勸一切不著果報我等相與先應至心五體投地歸命敬禮世間大慈悲父南無彌勒佛南無釋迦牟尼佛南無堅出佛南無安闍那佛南無增益佛南無香明佛南無違藍明佛南無金玉佛南無蜜鉢佛南無無礙相佛南無信戒佛南無至妙道佛南無樂實佛南無明法佛南無具威德佛南無至寂滅佛南無上慈佛南無大慈佛南無甘露主佛南無彌樓明佛南無聖讚佛南無廣照佛南無文殊師利菩薩南無普賢菩薩南無無邊身菩薩南無觀世音菩薩又復歸依如是十方盡虛空界一切三寶願以慈悲力同加覆護一切行願皆得圓滿今日道場同業大衆從今日去至于菩提行菩薩道誓莫退還先度衆生然後作佛若未得道中間留住生死者以此願力令諸大衆在所生處身口意業恆自清淨常發廣大勝妙之心柔軟心調和心勇猛心不放逸心寂滅心真心不雜亂心無貪吝心大勝心大慈悲心安住心歡喜心先度一切心守護一切心守護菩提心誓等佛心發如是等廣勝妙心專求多聞修離欲定饒益安樂一切衆生不捨菩提同成正覺說回向法今日道場同業大衆相與胡跪合掌心念口言隨我今說十方諸天仙所有功德業我今為回向同歸正覺道十方龍鬼神所有勝善業我今為回向同歸一乘道十方諸人王所修菩提業我今為回向同歸無上道六道衆生類所有微善業我今為回向同歸無上道十方佛弟子善來比丘衆無著四沙門及求緣覺者隱顯化衆生明了因緣法如是兼一切盡回向佛道十方諸菩薩讀誦受持經入禪出禪者勸總行衆善如是等三乘一切衆德本盡回施衆生同歸無上道天上及人間聖道諸善業我今勸回向同歸無上道發心及懺悔自行若勸人所有微毫福盡回施衆生衆生不得佛不捨菩提願一切成佛盡然後登正覺仰願佛菩薩無漏諸聖人此世及後生惟願見攝受相與至心五體投地奉為國王帝主回向奉為父母親緣回向奉為師長同學回向奉為信施檀越善惡知識回向奉為護世四王回向又為十方魔王回向又為聰明正直天地虛空主善罰惡守護持呪五方龍王龍神八部回向又為幽顯一切靈祇回向又為十方盡虛空界一切衆生回向唯願十方諸天諸仙龍神八部一切衆生從今日去至于菩提恆會無相不復耽著一拜
